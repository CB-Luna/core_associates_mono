name: core_associates_app_abogados
description: "App de abogados – Core Associates"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.2.1

  # Navigation
  go_router: ^17.1.0

  # Networking
  dio: ^5.9.1
  connectivity_plus: ^6.1.4

  # Storage
  flutter_secure_storage: ^10.0.0

  # Firebase
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # Maps & Location
  google_maps_flutter: ^2.14.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Media
  image_picker: ^1.2.1

  # Notifications
  flutter_local_notifications: ^19.2.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
