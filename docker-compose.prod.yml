# ============================================================
# docker-compose.prod.yml  -  Core Associates
# Archivo COMPLETO de produccion (standalone, no override)
#
# Uso:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Diferencias respecto a docker-compose.yml (desarrollo):
#   - API y Web usan target: production (builds optimizados)
#   - Sin volumes de codigo fuente (no hot-reload)
#   - PostgreSQL, Redis, MinIO solo accesibles via loopback (127.0.0.1)
#   - API y Web solo accesibles via loopback (trafico llega por Nginx)
#   - URLs parametrizables via .env (no hardcodeadas a localhost)
#   - NODE_ENV=production
#   - Nginx expone :80 y :443 (puertos estandar)
#   - restart: always para recuperacion automatica
#   - Limites de recursos (deploy.resources)
#   - Redis con maxmemory y eviction policy
#   - Sin pgAdmin (usar --profile tools si se necesita)
# ============================================================

services:
  # ──────────────────────────────────────────────
  # BASE DE DATOS - PostgreSQL 16 + PostGIS
  # Solo accesible via loopback (no expuesto a Internet)
  # ──────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: core_associates_postgres
    restart: always
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - core_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - core_associates_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ──────────────────────────────────────────────
  # CACHE - Redis 7
  # Solo accesible via loopback
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: core_associates_redis
    restart: always
    ports:
      - "127.0.0.1:6382:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - core_redis_data:/data
    networks:
      - core_associates_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ──────────────────────────────────────────────
  # ALMACENAMIENTO - MinIO
  # Solo accesible via loopback
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: core_associates_minio
    restart: always
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - core_minio_data:/data
    networks:
      - core_associates_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # Inicializacion de buckets en MinIO
  minio-init:
    image: minio/mc:latest
    container_name: core_associates_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set coreminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing coreminio/core-associates-documents;
      mc mb --ignore-existing coreminio/core-associates-providers;
      mc mb --ignore-existing coreminio/core-associates-promotions;
      mc mb --ignore-existing coreminio/core-associates-legal;
      mc anonymous set download coreminio/core-associates-providers;
      mc anonymous set download coreminio/core-associates-promotions;
      echo 'Buckets creados y configurados exitosamente';
      exit 0;
      "
    networks:
      - core_associates_network

  # ──────────────────────────────────────────────
  # BACKEND API - NestJS (produccion)
  # Solo accesible via loopback (trafico entra por Nginx)
  # ──────────────────────────────────────────────
  api:
    build:
      context: ./core-associates-api
      dockerfile: Dockerfile
      target: production
    container_name: core_associates_api
    restart: always
    ports:
      - "127.0.0.1:3501:3501"
    environment:
      NODE_ENV: production
      PORT: 3501
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9002}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - core_associates_network
    deploy:
      resources:
        limits:
          memory: 512M

  # ──────────────────────────────────────────────
  # FRONTEND WEB - Next.js (produccion)
  # Solo accesible via loopback (trafico entra por Nginx)
  # ──────────────────────────────────────────────
  web:
    build:
      context: ./core-associates-web
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3501}
        NEXT_PUBLIC_MINIO_URL: ${NEXT_PUBLIC_MINIO_URL:-http://localhost:9002}
    container_name: core_associates_web
    restart: always
    ports:
      - "127.0.0.1:3600:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3501}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3600}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_MINIO_URL: ${NEXT_PUBLIC_MINIO_URL:-http://localhost:9002}
    depends_on:
      - api
    networks:
      - core_associates_network
    deploy:
      resources:
        limits:
          memory: 512M

  # ──────────────────────────────────────────────
  # REVERSE PROXY - Nginx (puertos estandar)
  # Unico servicio expuesto a Internet
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: core_associates_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # Descomentar cuando tengas certificados SSL (certbot/Let's Encrypt):
      # - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - core_associates_network
    deploy:
      resources:
        limits:
          memory: 128M

  # ──────────────────────────────────────────────
  # pgAdmin (Opcional - solo con --profile tools)
  # ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: core_associates_pgadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:5056:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@coreassociates.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    volumes:
      - core_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - core_associates_network
    profiles:
      - tools

# ──────────────────────────────────────────────
# VOLUMENES PERSISTENTES
# ──────────────────────────────────────────────
volumes:
  core_pg_data:
    name: core_associates_pg_data
  core_redis_data:
    name: core_associates_redis_data
  core_minio_data:
    name: core_associates_minio_data
  core_pgadmin_data:
    name: core_associates_pgadmin_data

# ──────────────────────────────────────────────
# RED AISLADA
# ──────────────────────────────────────────────
networks:
  core_associates_network:
    name: core_associates_network
    driver: bridge
