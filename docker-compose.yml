# ============================================================
# CORE ASSOCIATES - Docker Compose
# ============================================================
# PUERTOS ASIGNADOS (evitar conflictos con grupovillaseñor y gen_portales):
#   PostgreSQL:    5435 (host) → 5432 (container)
#   Redis:         6382 (host) → 6379 (container)
#   MinIO API:     9002 (host) → 9000 (container)
#   MinIO Console: 9003 (host) → 9001 (container)
#   NestJS API:    3501 (host) → 3501 (container)
#   Next.js Web:   3600 (host) → 3000 (container)
#   Nginx:         8580 (host) → 80 (container)
#   pgAdmin:       5056 (host) → 80 (container)  ← 5055 usado por gen_portales
# ============================================================

services:
  # ──────────────────────────────────────────────
  # BASE DE DATOS - PostgreSQL 16 + PostGIS
  # ──────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: core_associates_postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-core_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-core_secret_2026}
      POSTGRES_DB: ${DB_NAME:-core_associates_db}
    volumes:
      - core_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - core_associates_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-core_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # CACHÉ Y COLAS - Redis 7
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: core_associates_redis
    restart: unless-stopped
    ports:
      - "6382:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-core_redis_2026}
    volumes:
      - core_redis_data:/data
    networks:
      - core_associates_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-core_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # ALMACENAMIENTO DE DOCUMENTOS - MinIO
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: core_associates_minio
    restart: unless-stopped
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-core_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-core_minio_secret_2026}
    command: server /data --console-address ":9001"
    volumes:
      - core_minio_data:/data
    networks:
      - core_associates_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Inicialización de buckets en MinIO
  minio-init:
    image: minio/mc:latest
    container_name: core_associates_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set coreminio http://minio:9000 $${MINIO_ROOT_USER:-core_minio_admin} $${MINIO_ROOT_PASSWORD:-core_minio_secret_2026};
      mc mb --ignore-existing coreminio/core-associates-documents;
      mc mb --ignore-existing coreminio/core-associates-providers;
      mc mb --ignore-existing coreminio/core-associates-promotions;
      mc mb --ignore-existing coreminio/core-associates-legal;
      mc mb --ignore-existing coreminio/core-associates-photos;
      mc anonymous set download coreminio/core-associates-providers;
      mc anonymous set download coreminio/core-associates-promotions;
      echo 'Buckets creados y configurados exitosamente';
      exit 0;
      "
    networks:
      - core_associates_network

  # ──────────────────────────────────────────────
  # BACKEND API - NestJS
  # ──────────────────────────────────────────────
  api:
    build:
      context: ./core-associates-api
      dockerfile: Dockerfile
      target: development
    container_name: core_associates_api
    restart: unless-stopped
    ports:
      - "3501:3501"
    environment:
      NODE_ENV: development
      PORT: 3501
      DATABASE_URL: postgresql://${DB_USER:-core_admin}:${DB_PASSWORD:-core_secret_2026}@postgres:5432/${DB_NAME:-core_associates_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-core_redis_2026}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-core_minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-core_minio_secret_2026}
      MINIO_PUBLIC_URL: http://localhost:9002
      JWT_SECRET: ${JWT_SECRET:-core_jwt_secret_change_in_production}
      JWT_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./core-associates-api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - core_associates_network

  # ──────────────────────────────────────────────
  # FRONTEND WEB - Next.js
  # ──────────────────────────────────────────────
  web:
    build:
      context: ./core-associates-web
      dockerfile: Dockerfile
      target: development
    container_name: core_associates_web
    restart: unless-stopped
    ports:
      - "3600:3000"
    environment:
      NODE_ENV: development
      API_INTERNAL_URL: http://api:3501
      NEXT_PUBLIC_API_URL: ""
      NEXTAUTH_URL: http://localhost:3600
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-core_nextauth_secret_change_in_production}
      NEXT_PUBLIC_MINIO_URL: http://localhost:9002
    volumes:
      - ./core-associates-web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - core_associates_network

  # ──────────────────────────────────────────────
  # REVERSE PROXY - Nginx
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: core_associates_nginx
    restart: unless-stopped
    ports:
      - "8580:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - web
    networks:
      - core_associates_network

  # ──────────────────────────────────────────────
  # pgAdmin (Opcional - Administración BD)
  # ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: core_associates_pgadmin
    restart: unless-stopped
    ports:
      - "5056:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@coreassociates.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    volumes:
      - core_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - core_associates_network
    profiles:
      - tools

# ──────────────────────────────────────────────
# VOLÚMENES PERSISTENTES
# ──────────────────────────────────────────────
volumes:
  core_pg_data:
    name: core_associates_pg_data
  core_redis_data:
    name: core_associates_redis_data
  core_minio_data:
    name: core_associates_minio_data
  core_pgadmin_data:
    name: core_associates_pgadmin_data

# ──────────────────────────────────────────────
# RED AISLADA
# ──────────────────────────────────────────────
networks:
  core_associates_network:
    name: core_associates_network
    driver: bridge
